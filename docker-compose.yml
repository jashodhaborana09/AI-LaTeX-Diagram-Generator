services:
  backend:
    build: .
    env_file:
      - .env
    environment:
      PORT: 5000
      VALIDATE_ENV_ON_START: ${VALIDATE_ENV_ON_START:-true}
    expose:
      - "5000"
    volumes:
      - generated_data:/app/data/generated
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:5000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped

volumes:
  generated_data:
  uploads_data:
